name: IndexNow — Submit Sitemap URLs

on:
  push:
    branches: [main]

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy
        run: sleep 60

      - name: Fetch sitemap and submit to IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          set -euo pipefail

          echo "Fetching sitemap from ${SITE_URL}/sitemap.xml ..."
          SITEMAP=$(curl -sSf "${SITE_URL}/sitemap.xml")
          echo "Sitemap fetched ($(echo "$SITEMAP" | wc -c) bytes)"

          # Parse all <loc> URLs using grep -o (POSIX-compatible)
          URLS=$(echo "$SITEMAP" | grep -o '<loc>[^<]*</loc>' | sed 's/<loc>//g;s/<\/loc>//g')

          if [ -z "$URLS" ]; then
            echo "::error::No URLs found in sitemap"
            exit 1
          fi

          URL_COUNT=$(echo "$URLS" | wc -l | tr -d ' ')
          echo "Found $URL_COUNT URLs in sitemap"

          # Build JSON array
          URL_JSON=$(echo "$URLS" | jq -R -s 'split("\n") | map(select(length > 0))')

          # Extract host from SITE_URL
          HOST=$(echo "$SITE_URL" | sed 's|https\?://||' | sed 's|/.*||')

          # Build payload
          PAYLOAD=$(jq -n \
            --arg host "$HOST" \
            --arg key "$INDEXNOW_KEY" \
            --arg keyLocation "${SITE_URL}/${INDEXNOW_KEY}.txt" \
            --argjson urlList "$URL_JSON" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

          echo "Submitting $URL_COUNT URLs to IndexNow for host $HOST ..."

          # Submit to IndexNow
          HTTP_CODE=$(curl -sS -o /tmp/indexnow-response.txt -w "%{http_code}" -X POST \
            "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")

          echo "IndexNow response: $HTTP_CODE"
          cat /tmp/indexnow-response.txt || true
          echo ""

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::IndexNow submission failed with status $HTTP_CODE"
            exit 1
          fi

          echo "Successfully submitted $URL_COUNT URLs to IndexNow"
