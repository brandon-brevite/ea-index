# .github/workflows/auto-index-submit.yml — TheEAIndex

name: Auto Index Submit

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 11 * * *'  # 7AM ET daily
  workflow_dispatch:

jobs:
  submit-urls:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g tsx

      - name: Wait for deploy
        if: github.event_name == 'push'
        run: sleep 60

      - uses: actions/cache/restore@v4
        with:
          path: data/submitted-urls.json
          key: submitted-urls-${{ github.sha }}
          restore-keys: submitted-urls-

      - name: Submit new URLs
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: npx tsx scripts/auto-index-submit.ts

      - uses: actions/cache/save@v4
        with:
          path: data/submitted-urls.json
          key: submitted-urls-${{ github.sha }}

      - name: Commit log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/submitted-urls.json || true
          git diff --staged --quiet || git commit -m "chore: update URL submission log"
          git push || true
